<html lang="vi">
<head>

    <meta property="og:description" content="Chuyển đổi các định dạng ngày tháng nhanh chóng và chính xác như dd/mm/yyyy sang mm/dd/yyyy hoặc ngược lại.">

    <meta property="twitter:description" content="Chuyển đổi các định dạng ngày tháng nhanh chóng và chính xác như dd/mm/yyyy sang mm/dd/yyyy hoặc ngược lại.">

    <title>Đổi Ngày - Tool Tiện Ích</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .copied-state {
            background-color: #dcfce7 !important;
            border-color: #86efac !important;
        }
        .copied-state .date-text {
            color: #15803d !important;
            font-weight: 600 !important;
        }
        .copied-state .icon-container {
            background-color: #bbf7d0 !important;
            color: #15803d !important;
        }
        
        /* Custom Scrollbar for lists */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col text-slate-800">

    <!-- Header (Sticky & Glassmorphism) -->
    <header class="glass-nav fixed w-full top-0 z-50 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16 sm:h-20">
                <div class="flex items-center gap-4">
                    <a href="index.html" class="w-10 h-10 rounded-xl flex items-center justify-center text-slate-500 hover:bg-slate-100 hover:text-blue-600 transition-colors">
                        <i class="fa-solid fa-arrow-left text-lg"></i>
                    </a>
                    <div class="h-6 w-px bg-slate-200"></div>
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center text-blue-600">
                            <i class="fa-regular fa-calendar-check"></i>
                        </div>
                        <h1 class="text-lg sm:text-xl font-bold text-slate-800">
                            Tạo Ngày <span class="text-blue-600">Ngẫu Nhiên</span> 
                        </h1>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow pt-24 sm:pt-32 pb-12 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto w-full">
        
        <!-- Hero Section -->
        <div class="text-center mb-10 animate-fade-in-up">
            <h2 class="text-2xl sm:text-3xl lg:text-4xl font-bold text-slate-900 mb-3 tracking-tight">
                Tạo Ngày <span class="text-blue-600">Ngẫu Nhiên</span>
            </h2>
            <p class="text-slate-500 text-sm sm:text-base max-w-2xl mx-auto">
                Chọn khoảng thời gian và số lượng ngày để tạo danh sách ngẫu nhiên nhanh chóng.
            </p>
        </div>

        <!-- Controls Section -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 sm:p-8 mb-8 max-w-4xl mx-auto">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 items-end">
                
                <!-- Start Date -->
                <div class="col-span-1 md:col-span-1">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">
                        Từ ngày
                    </label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-500 transition-colors">
                            <i class="fa-regular fa-calendar"></i>
                        </div>
                        <input type="date" id="startDate" class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all outline-none text-slate-700 font-medium text-sm">
                    </div>
                </div>

                <!-- End Date -->
                <div class="col-span-1 md:col-span-1">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">
                        Đến ngày
                    </label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-500 transition-colors">
                            <i class="fa-regular fa-calendar"></i>
                        </div>
                        <input type="date" id="endDate" class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all outline-none text-slate-700 font-medium text-sm">
                    </div>
                </div>

                <!-- Quantity Input -->
                <div class="col-span-1 md:col-span-1">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">
                        Số ngày/tháng
                    </label>
                    <div class="relative group">
                        <input type="number" id="dayCount" value="4" min="1" max="29" class="w-full pl-4 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all outline-none text-slate-700 font-medium text-center text-sm" placeholder="4">
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-slate-400 text-xs">
                            Max 29
                        </div>
                    </div>
                </div>

                <!-- Generate Button -->
                <div class="col-span-1 md:col-span-1">
                    <button onclick="handleGenerate()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-6 rounded-xl shadow-lg shadow-blue-500/30 hover:shadow-blue-500/40 transition-all transform hover:-translate-y-0.5 active:translate-y-0 flex items-center justify-center gap-2 cursor-pointer select-none">
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                        <span>Tạo lịch</span>
                    </button>
                </div>
            </div>

            <!-- Error Message -->
            <div id="error-message" class="hidden mt-4 p-3 bg-red-50 border border-red-100 text-red-600 rounded-xl text-sm font-medium text-center animate-pulse flex items-center justify-center gap-2">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="error-text"></span>
            </div>
        </div>

        <!-- Total Days Counter -->
        <div id="total-counter" class="hidden max-w-4xl mx-auto bg-gradient-to-r from-blue-600 to-indigo-600 rounded-xl shadow-lg p-4 mb-8 text-white flex items-center justify-center gap-3 animate-fade-in-up">
            <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center backdrop-blur-sm">
                <i class="fa-solid fa-calculator text-xl"></i>
            </div>
            <div>
                <div class="text-xs font-medium opacity-90 uppercase tracking-wide">Tổng số ngày đã tạo</div>
                <div class="text-2xl font-bold leading-none" id="total-days-count">0</div>
            </div>
        </div>

        <!-- Results Section -->
        <div id="results-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Results will be injected here -->
        </div>
        
        <!-- Empty State -->
        <div id="empty-state" class="text-center py-16 bg-white rounded-2xl border border-dashed border-slate-200 max-w-4xl mx-auto">
            <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-300">
                <i class="fa-regular fa-calendar-xmark text-3xl"></i>
            </div>
            <h3 class="text-slate-900 font-semibold mb-1">Chưa có dữ liệu</h3>
            <p class="text-slate-500 text-sm">Kết quả sẽ hiển thị ở đây sau khi bạn bấm nút "Tạo lịch"</p>
        </div>

    </main>

    <!-- Footer -->
    <footer class="mt-auto py-8 border-t border-slate-200 bg-white/50 backdrop-blur-sm">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-slate-400 text-sm font-medium">
                &copy; <script>document.write(new Date().getFullYear())</script> Tool Tiện Ích. Designed for productivity.
            </p>
        </div>
    </footer>

    <!-- JavaScript Logic -->
    <script>
        // --- State Management ---
        const copiedDates = new Set();

        // --- Utilities ---
        const getRandomInt = (min, max) => {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        };

        const formatDate = (day, month, year) => {
            const d = day.toString().padStart(2, '0');
            const m = (month + 1).toString().padStart(2, '0'); // Month is 0-indexed
            return `${d}/${m}/${year}`;
        };

        // --- Main Logic ---
        function handleGenerate() {
            const startDateInput = document.getElementById('startDate').value;
            const endDateInput = document.getElementById('endDate').value;
            const dayCountInput = parseInt(document.getElementById('dayCount').value);
            const errorDiv = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            const resultsContainer = document.getElementById('results-container');
            const emptyState = document.getElementById('empty-state');
            const totalCounter = document.getElementById('total-counter');
            const totalDaysCount = document.getElementById('total-days-count');

            // Reset UI
            errorDiv.classList.add('hidden');
            errorText.textContent = '';
            resultsContainer.innerHTML = '';
            copiedDates.clear();
            
            // Validation
            if (!startDateInput || !endDateInput) {
                showError('Vui lòng chọn đầy đủ ngày bắt đầu và ngày kết thúc.');
                return;
            }

            if (!dayCountInput || dayCountInput < 1 || dayCountInput > 29) {
                showError('Số ngày mỗi tháng phải từ 1 đến 29.');
                return;
            }

            const start = new Date(startDateInput);
            const end = new Date(endDateInput);

            if (start > end) {
                showError('Ngày bắt đầu không được lớn hơn ngày kết thúc.');
                return;
            }

            // Generate Dates
            emptyState.classList.add('hidden');
            let current = new Date(start.getFullYear(), start.getMonth(), 1);
            const endTime = new Date(end.getFullYear(), end.getMonth(), 1).getTime();
            let hasResults = false;
            let totalDays = 0;

            while (current.getTime() <= endTime) {
                hasResults = true;
                const year = current.getFullYear();
                const month = current.getMonth();
                const daysInMonth = new Date(year, month + 1, 0).getDate();

                const randomDays = new Set();
                // Ensure we don't try to get more days than exist in the month
                const countToGet = Math.min(dayCountInput, daysInMonth);

                while (randomDays.size < countToGet) {
                    const day = getRandomInt(1, daysInMonth);
                    randomDays.add(day);
                }

                const sortedDays = Array.from(randomDays).sort((a, b) => a - b);
                const formattedDates = sortedDays.map(day => formatDate(day, month, year));
                const monthName = `Tháng ${month + 1}, ${year}`;

                // Update total count
                totalDays += formattedDates.length;

                // Create Card HTML
                const card = createMonthCard(monthName, formattedDates);
                resultsContainer.appendChild(card);

                current.setMonth(current.getMonth() + 1);
            }

            if (!hasResults) {
                emptyState.classList.remove('hidden');
                totalCounter.classList.add('hidden');
            } else {
                totalCounter.classList.remove('hidden');
                totalDaysCount.textContent = totalDays;
            }
        }

        function showError(msg) {
            const errorDiv = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            errorText.textContent = msg;
            errorDiv.classList.remove('hidden');
        }

        // --- DOM Creation ---
        function createMonthCard(monthName, dates) {
            const card = document.createElement('div');
            card.className = "bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-xl hover:shadow-blue-500/10 transition-all duration-300 fade-in flex flex-col h-full";

            // Header
            const header = document.createElement('div');
            header.className = "bg-slate-50/50 px-5 py-4 border-b border-slate-100 flex justify-between items-center";
            header.innerHTML = `
                <span class="font-bold text-slate-800 text-base">${monthName}</span>
                <div class="flex items-center gap-2 bg-white px-2 py-1 rounded-md border border-slate-100 shadow-sm">
                    <span class="text-xs text-blue-600 font-bold">${dates.length}</span>
                    <span class="text-xs text-slate-400 font-medium">ngày</span>
                </div>
            `;

            // List Container
            const list = document.createElement('div');
            list.className = "custom-scrollbar p-4 space-y-2 overflow-y-auto max-h-[300px]";

            dates.forEach(date => {
                const item = document.createElement('div');
                item.className = "date-item group flex items-center justify-between p-3 rounded-xl border cursor-pointer select-none transition-all duration-200 bg-white border-slate-100 hover:border-blue-200 hover:bg-blue-50/50 active:scale-95";
                
                // Content
                item.innerHTML = `
                    <span class="font-mono text-base font-medium text-slate-600 date-text group-hover:text-blue-700 transition-colors">${date}</span>
                    <div class="icon-container w-8 h-8 flex items-center justify-center rounded-lg transition-colors bg-slate-50 text-slate-300 group-hover:bg-white group-hover:text-blue-500 group-hover:shadow-sm">
                        <i class="copy-icon fa-regular fa-copy text-sm"></i>
                        <i class="check-icon fa-solid fa-check text-sm hidden"></i>
                    </div>
                `;

                // Check if already copied
                if (copiedDates.has(date)) {
                    item.classList.add('copied-state');
                    const copyIcon = item.querySelector('.copy-icon');
                    const checkIcon = item.querySelector('.check-icon');
                    copyIcon.classList.add('hidden');
                    checkIcon.classList.remove('hidden');
                }

                // Click to copy
                item.onclick = () => copyToClipboard(date, item);
                list.appendChild(item);
            });

            card.appendChild(header);
            card.appendChild(list);
            return card;
        }

        function copyToClipboard(text, element) {
            // Fallback copy logic
            const doCopy = () => {
                showCopiedFeedback(element);
            };

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(doCopy).catch(err => {
                    console.error('Async: Could not copy text: ', err);
                    fallbackCopyTextToClipboard(text, doCopy);
                });
            } else {
                fallbackCopyTextToClipboard(text, doCopy);
            }
        }

        function fallbackCopyTextToClipboard(text, onSuccess) {
            var textArea = document.createElement("textarea");
            textArea.value = text;
            
            // Avoid scrolling to bottom
            textArea.style.top = "0";
            textArea.style.left = "0";
            textArea.style.position = "fixed";

            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
                var successful = document.execCommand('copy');
                if(successful) onSuccess();
            } catch (err) {
                console.error('Fallback: Oops, unable to copy', err);
            }

            document.body.removeChild(textArea);
        }

        function showCopiedFeedback(element) {
            // Get the date text
            const textSpan = element.querySelector('.date-text');
            const dateText = textSpan.textContent;
            
            // Add to copied dates set
            copiedDates.add(dateText);
            
            // Get icon elements
            const copyIcon = element.querySelector('.copy-icon');
            const checkIcon = element.querySelector('.check-icon');
            
            // Remove any existing classes
            const originalClasses = ["bg-white", "border-slate-100", "hover:border-blue-200", "hover:bg-blue-50/50"];
            element.classList.remove(...originalClasses);
            
            // Apply permanent copied state
            element.classList.add('copied-state');
            
            // Show check icon
            copyIcon.classList.add('hidden');
            checkIcon.classList.remove('hidden');
            
            // Flash animation for immediate feedback
            element.style.transform = 'scale(1.02)';
            setTimeout(() => {
                element.style.transform = 'scale(1)';
            }, 200);
        }
    </script>
</body>
</html>
